<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yellow Fellows</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="site-bg" aria-hidden="true"></div>
<div class="disc-bg" aria-hidden="true"></div>

<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="brand" id="brandLogo" aria-label="Yellow Fellows — home. On mobile, tap to toggle the menu." aria-expanded="false">
      <img src="images/logo.png" alt="Yellow Fellows" class="logo-img"
        onerror="this.replaceWith(Object.assign(document.createElement('span'),{className:'logo-fallback',textContent:'🥏 YELLOW FELLOWS'}));">
    </a>
    <nav class="site-nav" id="siteNav">
      <a href="index.html" class="active">HOME</a>
      <a href="about.html">ABOUT</a>
      <a href="contact.html">CONTACT</a>
    </nav>
  </div>
</header>

<div class="wrap">
  <header class="page-hero">
    <div class="eyebrow">Social Ultimate Club · Sydney, Australia</div>
    <h1>Meet the <span class="hl">teams</span></h1>
    <p class="sub">Select a team below to see the roster and learn more about our players.</p>
  </header>

  <nav class="tabs" role="tablist" aria-label="Team selector"></nav>
  <div class="team-meta">
    <p class="team-est" id="teamEst"></p>
    <p class="team-desc" id="teamDesc"></p>
  </div>

  <div class="stage-wrap" id="stage">

    <div class="stage-photo" id="stagePhoto">
      <video
        id="stageVideo"
        class="stage-video"
        autoplay
        muted
        loop
        playsinline
      ></video>

      <div class="stage-scrim"></div>

      <div class="player-figure" id="playerFigure"></div>
    </div>

    <div class="info-card" id="infoCard">

      <button class="stage-arrow arrow-left" aria-label="Previous player">‹</button>
      <button class="stage-arrow arrow-right" aria-label="Next player">›</button>
      <div class="trophy-tag" id="trophyTag">
        <span class="trophy-icon">🏆</span>
        <span class="trophy-text" id="trophyText"></span>
      </div>
      <div class="badge-row" id="badgeRow"></div>
      <p class="stage-name" id="stageName"></p>
      <span class="nickname" id="stageNickname"></span>
      <p class="funfact" id="stageFunfact"></p>

      <div class="player-stat-row single">
        <div class="player-stat">
          <p class="p-label">Started playing in</p>
          <p class="p-value" id="stageStarted"></p>
        </div>
      </div>
    </div>

    <div class="thumb-row" id="thumbRow"></div>
  </div>
</div>

<footer class="site-footer">Yellow Fellows - 2026</footer>

<script src="script.js" defer></script>
</body>
</html>
